name: Discourse
options:
  bundleIdPrefix: com.riiiiiiiley
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

packages:
  MatrixRustSDK:
    url: https://github.com/matrix-org/matrix-rust-components-swift
    exactVersion: "26.06.06"

targets:
  Discourse:
    type: application
    platform: macOS
    scheme: {}
    sources:
      - path: Discourse
        excludes:
          - "Info.plist"
          - "Info-iOS.plist"
    dependencies:
      - package: MatrixRustSDK
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.riiiiiiiley.Discourse
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: Discourse.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        DEAD_CODE_STRIPPING: "YES"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Discourse/Info.plist
      properties:
        CFBundleDisplayName: Discourse
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        CFBundleURLTypes:
          - CFBundleURLName: OAuth Callback
            CFBundleURLSchemes:
              - com.riiiiiiiley.discourse
        NSMicrophoneUsageDescription: Discourse uses the microphone for voice and video calls and voice messages.
        NSLocationUsageDescription: Discourse uses your location only when you choose to share it in a chat.
        NSLocationWhenInUseUsageDescription: Discourse uses your location only when you choose to share it in a chat.
        NSCameraUsageDescription: Discourse uses the camera for video calls.

  DiscourseNSE:
    type: app-extension
    platform: iOS
    sources:
      - path: DiscourseNSE
        excludes:
          - "Info.plist"
      - path: Discourse/Core/SessionStore.swift
      - path: Discourse/Core/PushConfig.swift
      - path: Discourse/Core/SpaceNameStore.swift
      - path: Discourse/Core/MatrixPlatform.swift
      - path: Discourse/Core/RestorationToken+FFI.swift
    dependencies:
      - package: MatrixRustSDK
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.riiiiiiiley.Discourse.NSE
        PRODUCT_NAME: DiscourseNSE
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 44LAW4UL9G
        CODE_SIGN_ENTITLEMENTS: DiscourseNSE/DiscourseNSE.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: DiscourseNSE/Info.plist
      properties:
        CFBundleDisplayName: DiscourseNSE
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService

  Discourse-iOS:
    type: application
    platform: iOS
    scheme: {}
    sources:
      - path: Discourse
        excludes:
          - "Info.plist"
          - "Info-iOS.plist"
    dependencies:
      - package: MatrixRustSDK
      - target: DiscourseNSE
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.riiiiiiiley.Discourse
        PRODUCT_NAME: Discourse
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 44LAW4UL9G
        CODE_SIGN_ENTITLEMENTS: Discourse-iOS.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Discourse/Info-iOS.plist
      properties:
        CFBundleDisplayName: Discourse
        NSHumanReadableCopyright: ""
        UILaunchScreen: {}
        # Single-scene on iOS: multi-scene support made UIKit run its per-scene
        # background state-restoration snapshot off the main thread, crashing on
        # background (e.g. after tapping a notification). The detached call window
        # is macOS-only anyway; iOS uses a full-screen cover.
        UIApplicationSupportsMultipleScenes: false
        # Keeps the process alive in the background during a call so the
        # MatrixRTC membership heartbeat keeps refreshing (see CallViewModel's
        # audio session) — otherwise other participants see you drop when idle.
        UIBackgroundModes:
          - audio
        # iPhone is portrait-only; iPad keeps every orientation.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: OAuth Callback
            CFBundleURLSchemes:
              - com.riiiiiiiley.discourse
        NSMicrophoneUsageDescription: Discourse uses the microphone for voice and video calls and voice messages.
        NSLocationUsageDescription: Discourse uses your location only when you choose to share it in a chat.
        NSLocationWhenInUseUsageDescription: Discourse uses your location only when you choose to share it in a chat.
        NSCameraUsageDescription: Discourse uses the camera for video calls.
